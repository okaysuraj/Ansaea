
services:
  postgres:
    image: postgres:18-alpine
    container_name: ansaea_postgres
    env_file:
      - .env
    ports:
      - "5440:5432"
    volumes:
      - ansaea_db_data:/var/lib/postgresql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ansaea_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
    container_name: ansaea_frontend
    ports:
      - "80:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  ansaea_db_data:
